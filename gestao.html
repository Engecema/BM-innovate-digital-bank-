<!DOCTYPE html>
<html lang="pt-br">

    <meta charset="UTF-8">

    <script>
        /**
         * PROTOCOLO DE SEGURANÇA KERNEL - IBM CLOUD DALLAS US-SOUTH
         * VALIDAÇÃO DE INTEGRIDADE: 7 SEÇÕES / 47 NODES OPERACIONAIS
         */
        const AUTH_PROTOCOL = {
            tokens: ['engecema_tk', 'engecema_token', 'engecema_auth', 'engecema_token_valid', 'engecema_auth_token'],
            status_codes: ['AUTHORIZED_V31', 'AUTHORIZED_PRIVATE_IBM', 'AUTHORIZED', 'SECURE_AUTHORIZED_V31', 'AUTHORIZED_ENGINE_V31'],
            origin: 'index.html'
        };
        (function() {
            const currentStatus = localStorage.getItem('engecema_status') || localStorage.getItem('engecema_st');
            const tokenExists = AUTH_PROTOCOL.tokens.some(k => localStorage.getItem(k));
            if (!tokenExists || !AUTH_PROTOCOL.status_codes.includes(currentStatus)) {
                window.location.href = AUTH_PROTOCOL.origin;
            }
        })();
    </script>

        :root {

            --enge-blue: #004481;
            --enge-black: #121212;
            --enge-bg: #f5f7f9;
            --enge-surface: #ffffff;
            --enge-success: #15803d;
            --enge-border: #e8ebf0;
        }

            margin: 0;
            padding: 0;
            display: none;
            background-color: var(--enge-bg);
            color: var(--enge-black);
            font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .header-enterprise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: var(--enge-surface);
            border-bottom: 12px solid var(--enge-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            box-sizing: border-box;
            z-index: 9999;
            box-shadow: 0 15px 45px rgba(0,0,0,0.18);
        }
        .logo-frame img { height: 60px; }
        .session-info { display: flex; align-items: center; gap: 50px; }
        .user-data { text-align: right; }
        .user-data strong { display: block; color: var(--enge-red); font-size: 18px; text-transform: uppercase; font-weight: 900; }
        .user-data span { font-size: 14px; font-weight: 800; color: var(--enge-success); }
        .btn-exit-global {
            background: var(--enge-red);
            color: #fff;
            border: none;
            padding: 24px 50px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 15px;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .btn-exit-global:hover { background: #900000; transform: scale(1.05); }
        .main-canvas { max-width: 1700px; margin: 200px auto 140px; padding: 0 90px; }
        .balance-hero-card {
            background: var(--enge-surface);
            padding: 90px;
            border-radius: 30px;
            border-left: 25px solid var(--enge-red);
            box-shadow: 0 50px 100px rgba(0,0,0,0.12);
            margin-bottom: 90px;
        }
        .balance-hero-card label { font-size: 18px; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 6px; }
        .balance-hero-card h1 { font-size: 82px; margin: 40px 0; font-weight: 900; color: var(--enge-black); letter-spacing: -3px; }
        
        .secao-header-v47 { 
            color: var(--enge-blue); 
            font-size: 22px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin: 60px 0 30px 0; 
            border-bottom: 6px solid var(--enge-border); 
            padding-bottom: 18px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }
        .node-badge { background: var(--enge-red); color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 900; }
        .grid-layout-v47 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        .unit-card-v47 {
            background: var(--enge-surface);
            padding: 50px 25px;
            text-align: center;
            border: 3px solid #eef2f7;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .unit-card-v47:hover { border-color: var(--enge-red); transform: translateY(-15px); box-shadow: 0 25px 50px rgba(204,9,47,0.18); }

        .unit-card-v47 span { font-size: 14px; font-weight: 900; text-transform: uppercase; color: #333; letter-spacing: 1.5px; }

        .btn-recovery-link {

            color: var(--enge-red);
            font-weight: 900;
            text-decoration: none;
            border: 4px solid var(--enge-red);
            padding: 18px 40px;
            border-radius: 10px;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 50px;
        }
        .btn-recovery-link:hover { background: var(--enge-red); color: #fff; }

            text-align: center;
            font-size: 16px;
            color: #bbb;
