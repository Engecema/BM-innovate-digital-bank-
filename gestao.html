<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema Gestão | Dallas Enterprise Cluster</title>
    <script>
        /**
         * PROTOCOLO DE SEGURANÇA KERNEL - IBM CLOUD DALLAS US-SOUTH
         * VALIDAÇÃO DE INTEGRIDADE: 7 SEÇÕES / 47 NODES OPERACIONAIS
         */
        const AUTH_PROTOCOL = {
            tokens: ['engecema_tk', 'engecema_token', 'engecema_auth', 'engecema_token_valid', 'engecema_auth_token'],
            status_codes: ['AUTHORIZED_V31', 'AUTHORIZED_PRIVATE_IBM', 'AUTHORIZED', 'SECURE_AUTHORIZED_V31', 'AUTHORIZED_ENGINE_V31'],
            origin: 'index.html'
        };
        (function() {
            const currentStatus = localStorage.getItem('engecema_status') || localStorage.getItem('engecema_st');
            const tokenExists = AUTH_PROTOCOL.tokens.some(k => localStorage.getItem(k));
            if (!tokenExists || !AUTH_PROTOCOL.status_codes.includes(currentStatus)) {
                window.location.href = AUTH_PROTOCOL.origin;
            }
        })();
    </script>
    <style>
        :root {
            --enge-red: #cc092f;
            --enge-blue: #004481;
            --enge-black: #121212;
            --enge-bg: #f5f7f9;
            --enge-surface: #ffffff;
            --enge-success: #15803d;
            --enge-border: #e8ebf0;
        }
        body {
            margin: 0;
            padding: 0;
            display: none;
            background-color: var(--enge-bg);
            color: var(--enge-black);
            font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .header-enterprise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 115px;
            background: var(--enge-surface);
            border-bottom: 12px solid var(--enge-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 75px;
            box-sizing: border-box;
            z-index: 9999;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
        }
        .logo-frame img { height: 58px; }
        .session-info { display: flex; align-items: center; gap: 50px; }
        .user-data { text-align: right; }
        .user-data strong { display: block; color: var(--enge-red); font-size: 17px; text-transform: uppercase; font-weight: 900; }
        .user-data span { font-size: 13px; font-weight: 800; color: var(--enge-success); }
        .btn-exit-global {
            background: var(--enge-red);
            color: #fff;
            border: none;
            padding: 22px 45px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .btn-exit-global:hover { background: #900000; transform: scale(1.05); }
        .main-canvas { max-width: 1650px; margin: 190px auto 130px; padding: 0 85px; }
        .balance-hero-card {
            background: var(--enge-surface);
            padding: 80px;
            border-radius: 25px;
            border-left: 22px solid var(--enge-red);
            box-shadow: 0 45px 90px rgba(0,0,0,0.12);
            margin-bottom: 85px;
        }
        .balance-hero-card label { font-size: 17px; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 5px; }
        .balance-hero-card h1 { font-size: 78px; margin: 35px 0; font-weight: 900; color: var(--enge-black); }
        
        /* RENDERIZAÇÃO DE ESTRUTURA CLUSTER */
        .secao-container { margin-bottom: 70px; }
        .secao-header-v47 { 
            color: var(--enge-blue); 
            font-size: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin: 50px 0 25px 0; 
            border-bottom: 5px solid var(--enge-border); 
            padding-bottom: 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 2px;
        }
        .node-badge { background: var(--enge-red); color: #fff; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: 900; }
        .grid-layout-v47 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }
        .unit-card-v47 {
            background: var(--enge-surface);
            padding: 40px 20px;
            text-align: center;
            border: 2px solid #e0e6ed;
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .unit-card-v47:hover { border-color: var(--enge-red); transform: translateY(-12px); box-shadow: 0 20px 40px rgba(204,9,47,0.15); }
        .unit-card-v47 i { font-size: 48px; font-style: normal; margin-bottom: 20px; }
        .unit-card-v47 span { font-size: 13px; font-weight: 900; text-transform: uppercase; color: #333; letter-spacing: 1px; }

        .btn-recovery-link {
            display: inline-block;
            color: var(--enge-red);
            font-weight: 900;
            text-decoration: none;
            border: 3px solid var(--enge-red);
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 13px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 40px;
        }
        .btn-recovery-link:hover { background: var(--enge-red); color: #fff; }

        .footer-purged {
            margin-top: 150px;
            padding: 80px 0;
            border-top: 3px solid var(--enge-border);
            text-align: center;
            font-size: 15px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: #fff;
        }
        .modal-cluster {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 99999;
            backdrop-filter: blur(30px);
            align-items: center;
            justify-content: center;
        }
        .modal-cluster-body {
            background: var(--enge-surface);
            width: 92%; max-width: 700px; padding: 80px;
            border-radius: 30px; border-top: 20px solid var(--enge-red);
            text-align: center;
        }
    </style>
</head>

            <button onclick="EngineCore.closeModal()" style="padding: 20px 60px; cursor: pointer; font-weight: 900; background: var(--enge-red); color: #fff; border: none; border-radius: 10px; width: 100%; text-transform: uppercase; letter-spacing: 2px;">Fechar Módulo</button>
        </div>

    <script>
        /**
         * CLUSTER TOPOLOGY MAP
         * Distribuição técnica exata de 47 Nodes em 7 Camadas de Segurança
         */
        const CLUSTER_DEFS = {
            balance: 1250000.00,
            nodes_target: 47,
            sections_target: 7,
            structure: [
                { id: 1, label: "Transações e Consultas", nodes: 15, icon: "📱" },
                { id: 2, label: "Empréstimos e Créditos", nodes: 4, icon: "💰" },
                { id: 3, label: "Investimentos Private", nodes: 4, icon: "💎" },
                { id: 4, label: "Contas Especiais", nodes: 7, icon: "🌍" },
                { id: 5, label: "Compras e Benefícios", nodes: 4, icon: "🎁" },
                { id: 6, label: "Perfil e Segurança", nodes: 6, icon: "🛡️" },
                { id: 7, label: "Infraestrutura Dallas", nodes: 7, icon: "🖥️" }
            ]
        };

        const EngineCore = {
            init: function() {
                this.authenticate();
                this.renderGrid();
                document.getElementById('GESTAO-ROOT-V90').style.display = 'block';
                console.log("[KERNEL] Dallas UI Engine Renderized.");
            },

            authenticate: function() {
                const user = localStorage.getItem('engecema_user') || "GEONI CESAR DE MATOS";
                const balance = localStorage.getItem('sessao_saldo') || CLUSTER_DEFS.balance;
                document.getElementById('user-display-tag').innerText = user.toUpperCase();
                document.getElementById('main-balance-display').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(balance);
            },

            /**
             * MOTOR DE RENDERIZAÇÃO DE ALTA DENSIDADE
             * Constrói dinamicamente as seções conforme a topologia do cluster
             */
            renderGrid: function() {
                const mount = document.getElementById('parity-mount-point');
                if (!mount) return;

                let buffer = "";

                CLUSTER_DEFS.structure.forEach(section => {
                    buffer += `
                        <div class="secao-container">
                            <div class="secao-header-v47">
                                ${section.id}. ${section.label} 
                                <span class="node-badge">${section.nodes} NODES SYNC</span>
                            </div>
                            <div class="grid-layout-v47">
                    `;

                    for (let i = 1; i <= section.nodes; i++) {
                        buffer += `
                            <div class="unit-card-v47" onclick="EngineCore.openModal('${section.label}', ${i})">
                                <i>${section.icon}</i>
                                <span>Subseção ${section.id}.${i.toString().padStart(2, '0')}</span>
                            </div>
                        `;
                    }

                    buffer += `</div></div>`;
                });

                mount.innerHTML = buffer;
            },

            openModal: function(title, node) {
                document.getElementById('modal-cluster').style.display = 'flex';
                document.getElementById('modal-title-label').innerText = `${title} | NODE ${node}`;
            },

            closeModal: function() {
                document.getElementById('modal-cluster').style.display = 'none';
            },

            logout: function() {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        };

        /**

         */

            N21:{st:"READY",lat:14}, N22:{st:"READY",lat:14}, N23:{st:"READY",lat:14}, N24:{st:"READY",lat:14},
            N25:{st:"READY",lat:14}, N26:{st:"READY",lat:14}, N27:{st:"READY",lat:14}, N28:{st:"READY",lat:14},
            N29:{st:"READY",lat:14}, N30:{st:"READY",lat:14}, N31:{st:"READY",lat:14}, N32:{st:"READY",lat:14},
            N33:{st:"READY",lat:14}, N34:{st:"READY",lat:14}, N35:{st:"READY",lat:14}, N36:{st:"READY",lat:14},
            N37:{st:"READY",lat:14}, N38:{st:"READY",lat:14}, N39:{st:"READY",lat:14}, N40:{st:"READY",lat:14},
            N41:{st:"READY",lat:14}, N42:{st:"READY",lat:14}, N43:{st:"READY",lat:14}, N44:{st:"READY",lat:14},
            N45:{st:"READY",lat:14}, N46:{st:"READY",lat:14}, N47:{st:"READY",lat:14}
        };

        const SecurityAudit = { level: 7, cipher: "AES-256-GCM", handshake: true, webhook: "ACTIVE" };
