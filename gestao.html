        /**
         * KERNEL SECURITY PROTOCOL - IBM CLOUD DALLAS US-SOUTH
         * LAYER 7 INTEGRITY: 7 SECTIONS / 47 NODES OPERATIONAL
         */
        const AUTH_PROTOCOL = {
            tokens: ['engecema_tk', 'engecema_token', 'engecema_auth', 'engecema_st_valid'],
            status_codes: ['AUTHORIZED_V31', 'AUTHORIZED_PRIVATE_IBM', 'SECURE_AUTHORIZED_V31'],
            origin: 'index.html'
        };
        (function() {
            const currentStatus = localStorage.getItem('engecema_status');
            const tokenExists = AUTH_PROTOCOL.tokens.some(k => localStorage.getItem(k));
            if (!tokenExists || !AUTH_PROTOCOL.status_codes.includes(currentStatus)) {
                window.location.href = AUTH_PROTOCOL.origin;
            }
        })();

    <style>
        :root {
            --enge-red: #cc092f;
            --enge-blue: #004481;
            --enge-black: #121212;
            --enge-bg: #f5f7f9;
            --enge-surface: #ffffff;
            --enge-success: #15803d;
            --enge-border: #e8ebf0;
            --enge-shadow: rgba(0,0,0,0.15);
        }
        body {
            margin: 0; padding: 0; display: none;
            background-color: var(--enge-bg); color: var(--enge-black);
            font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased;
        }
        .header-enterprise {
            position: fixed; top: 0; left: 0; width: 100%; height: 125px;
            background: var(--enge-surface); border-bottom: 12px solid var(--enge-red);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 80px; box-sizing: border-box; z-index: 9999;
            box-shadow: 0 20px 50px var(--enge-shadow);
        }
        .logo-frame img { height: 65px; }
        .session-info { display: flex; align-items: center; gap: 50px; }
        .user-data { text-align: right; }
        .user-data strong { display: block; color: var(--enge-red); font-size: 20px; text-transform: uppercase; font-weight: 900; }
        .btn-exit {
            background: var(--enge-red); color: #fff; border: none;
            padding: 25px 55px; border-radius: 10px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 15px;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #900000; transform: scale(1.05); }
        .main-canvas { max-width: 1750px; margin: 210px auto 150px; padding: 0 100px; }
        
        .hero-card {
            background: var(--enge-surface); padding: 100px; border-radius: 35px;
            border-left: 30px solid var(--enge-red); box-shadow: 0 60px 120px var(--enge-shadow);
            margin-bottom: 100px; position: relative;
        }
        .hero-card label { font-size: 18px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 5px; }
        .hero-card h1 { font-size: 85px; margin: 40px 0; font-weight: 900; letter-spacing: -4px; color: var(--enge-black); }
        
        /* ESTILOS DE RENDERIZAÇÃO DE CAMADAS */
        .secao-container { margin-bottom: 90px; }
        .secao-header { 
            color: var(--enge-blue); font-size: 26px; font-weight: 900; 
            text-transform: uppercase; border-bottom: 8px solid var(--enge-border); 
            padding-bottom: 25px; display: flex; justify-content: space-between;
            align-items: center; letter-spacing: 2px;
        }
        .badge-count { background: var(--enge-red); color: #fff; padding: 10px 25px; border-radius: 12px; font-size: 14px; }
        .grid-v47 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 45px; margin-top: 50px; }
        .unit-card {
            background: var(--enge-surface); padding: 70px 40px; text-align: center;
            border: 4px solid #f0f3f7; cursor: pointer; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 30px; display: flex; flex-direction: column; align-items: center;
        }
        .unit-card:hover { border-color: var(--enge-red); transform: translateY(-20px); box-shadow: 0 35px 70px rgba(204,9,47,0.2); }
        .unit-card i { font-size: 75px; font-style: normal; margin-bottom: 35px; }
        .unit-card span { font-size: 18px; font-weight: 900; text-transform: uppercase; color: #333; }

        .recovery-button-link {
            display: inline-block; color: var(--enge-red); font-weight: 900;
            text-decoration: none; border: 5px solid var(--enge-red);
            padding: 22px 60px; border-radius: 15px; font-size: 16px;
            text-transform: uppercase; transition: 0.3s; margin-bottom: 70px;
        }
        .recovery-button-link:hover { background: var(--enge-red); color: #fff; }

            text-transform: uppercase; letter-spacing: 10px; background: #fff;
        }
