<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Credenciamento Enterprise | IBM Cloud Dallas</title>
    <style>
        :root { 
            --enge-red: #cc092f; 
            --enge-blue: #004481;
            --enge-bg: #f5f7f9; 
            --enge-surface: #ffffff;
            --enge-text: #1a1a1a;
            --enge-border: #d1d5db;
        }
        body { 
            font-family: 'IBM Plex Sans', sans-serif; 
            margin: 0; 
            background: var(--enge-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 25px; 
            color: var(--enge-text);
        }
        .main-frame-v31 { 
            background: var(--enge-surface); 
            padding: 70px; 
            border-radius: 15px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.12); 
            width: 100%; 
            max-width: 600px; 
            border-top: 12px solid var(--enge-red); 
            position: relative; 
        }
        .header-section { text-align: center; margin-bottom: 50px; }
        .header-section img { height: 55px; margin-bottom: 25px; }
        .header-section h2 { 
            color: var(--enge-red); 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 24px; 
            margin: 0; 
            letter-spacing: 2px; 
        }
        .input-group-v31 { margin-bottom: 25px; }
        .selector-box { 
            display: flex; 
            gap: 30px; 
            margin-bottom: 30px; 
            justify-content: center; 
        }
        .selector-box label { 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            color: #4b5563; 
            cursor: pointer; 
            font-weight: 700; 
        }
        .field-label { 
            display: block; 
            font-size: 12px; 
            font-weight: 800; 
            color: #6b7280; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        .input-control { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid var(--enge-border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #f9fafb; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .input-control:focus {
            border-color: var(--enge-blue);
            outline: none;
            background: var(--enge-surface);
            box-shadow: 0 0 0 5px rgba(0, 68, 129, 0.1);
        }
        #sync-status-v31 { 
            display: none; 
            background: #e0f2fe; 
            border: 1px solid #7dd3fc; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
            text-align: center; 
            font-size: 14px; 
            color: #0369a1; 
            font-weight: 700;
        }
        .firewall-container { 
            background: #fffbeb; 
            border: 1px solid #fde68a; 
            padding: 25px; 
            border-radius: 8px; 
            margin: 35px 0; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        .firewall-container input[type="checkbox"] { 
            width: 24px; 
            height: 24px; 
            cursor: pointer; 
        }
        .firewall-label { font-size: 13px; color: #92400e; font-weight: 700; line-height: 1.5; }
        .btn-submit-v31 { 
            width: 100%; 
            padding: 24px; 
            background: var(--enge-red); 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 17px; 
            margin-top: 25px; 
            transition: 0.4s; 
            opacity: 0.3; 
            pointer-events: none; 
            letter-spacing: 3px;
        }
        .active-btn { opacity: 1 !important; pointer-events: all !important; box-shadow: 0 15px 30px rgba(204,9,47,0.3); }
        .active-btn:hover { background: #900000; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="main-frame-v31">
    <div class="header-section">
        <img src="logo.png" alt="Engecema">
        <h2>Credenciamento Dallas VPC</h2>
    </div>

    <form id="registrar-form-v31" autocomplete="off">
        <div class="selector-box">
            <label><input type="radio" name="acc_type" value="PF" checked onclick="CoreEngine.toggleDoc('CPF')"> Pessoa Física</label>
            <label><input type="radio" name="acc_type" value="PJ" onclick="CoreEngine.toggleDoc('CNPJ')"> Pessoa Jurídica</label>
        </div>

        <div class="input-group-v31">
            <label id="doc-label-v31" class="field-label">Documento Digital (CPF/CNPJ)</label>
            <input type="text" id="v31-doc-input" name="v31_documento" class="input-control" placeholder="000.000.000-00" required onblur="CoreEngine.lookup()">
        </div>

        <div id="sync-status-v31">Sincronizando Cluster Dallas us-south...</div>

        <div class="input-group-v31">
            <label class="field-label">Nome / Razão Social (Validado IBM)</label>
            <input type="text" id="v31-nome-input" name="v31_nome" class="input-control" readonly placeholder="Aguardando Validação...">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Endereço Registrado (Regional SP)</label>
            <input type="text" id="v31-end-input" name="v31_endereco" class="input-control" readonly placeholder="Localizando...">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Patrimônio sob Gestão (Cluster Dallas)</label>
            <input type="text" id="v31-val-input" name="v31_patrimonio" class="input-control" readonly style="color: var(--enge-red); font-weight: 900; font-size: 20px;">
        </div>

        <div class="input-group-v31">
            <label class="field-label">Senha de Acesso (4 dígitos)</label>
            <input type="password" id="v31-pass-input" name="v31_senha" class="input-control" maxlength="4" placeholder="••••" required autocomplete="new-password">
        </div>

        <div class="firewall-container">
            <input type="checkbox" id="v31-firewall-check" onclick="CoreEngine.toggleSubmit()">
            <div class="firewall-label">Autorizo a sincronização de paridade de 47 nodes e 7 seções para a região Dallas us-south.</div>
        </div>

        <button type="submit" id="v31-btn-submit" class="btn-submit-v31">Efetivar Credenciamento</button>
    </form>
</div>

<script>
    const CoreEngine = {
        meta: {
            balance: "1250000.00",
            nodes: 47,
            sections: 7,
            status_id: "AUTHORIZED_V31",
            version: "v31.17.0"
        },
        boot: function() {
            this.purgeDOMInfection();
            this.setupObserver();
            console.log(`[BOOT] Cluster Dallas Engine ${this.meta.version} Active.`);
        },
        purgeDOMInfection: function() {
            const targets = document.querySelectorAll('input');
            targets.forEach(t => {
                if (t.value.includes("1.250") || t.value.includes("1250000")) {
                    t.value = "";
                    t.setAttribute("autocomplete", "new-password");
                    t.blur();
                }
            });
            localStorage.removeItem('sessao_saldo');
            localStorage.removeItem('engecema_status');
        },
        setupObserver: function() {
            const observer = new MutationObserver(() => this.purgeDOMInfection());
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        },
        toggleDoc: function(t) {
            document.getElementById('doc-label-v31').innerText = (t === 'CPF') ? "CPF / Documento Digital" : "CNPJ / Documento Empresarial";
            document.getElementById('v31-doc-input').placeholder = (t === 'CPF') ? "000.000.000-00" : "00.000.000/0000-00";
        },
        toggleSubmit: function() {
            const c = document.getElementById('v31-firewall-check');
            const b = document.getElementById('v31-btn-submit');
            c.checked ? b.classList.add('active-btn') : b.classList.remove('active-btn');
        },
        lookup: async function() {
            const d = document.getElementById('v31-doc-input').value;
            const s = document.getElementById('sync-status-v31');
            const n = document.getElementById('v31-nome-input');
            const e = document.getElementById('v31-end-input');
            const v = document.getElementById('v31-val-input');
            if(d.length >= 11) {
                s.style.display = 'block';
                s.innerHTML = "<b>Consultando Handshake Dallas Cluster...</b>";
                setTimeout(() => {
                    s.style.background = "#dcfce7";
                    s.style.borderColor = "#86efac";
                    s.style.color = "#15803d";
                    s.innerHTML = "<b>PARIDADE 47/7 VALIDADA (IBM CLOUD)!</b>";
                    const isPJ = document.querySelector('input[name="acc_type"]:checked').value === 'PJ';
                    n.value = isPJ ? "ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA" : "GEONI CESAR DE MATOS";
                    e.value = isPJ ? "Av. Paulista, 1000 - Bela Vista, São Paulo" : "Rua Oscar Freire, 1200 - Jardins, São Paulo";
                    v.value = "R$ 1.250.000,00"; 
                }, 1800);
            }
        },
        finalize: function() {
            const payload = {
                status: this.meta.status_id,
                tk: btoa(Date.now().toString()),
                user: document.getElementById('v31-nome-input').value,
                ow: document.getElementById('v31-nome-input').value,
                bal: this.meta.balance,
                ts: Date.now(),
                nodes: this.meta.nodes,
                sections: this.meta.sections
            };
            Object.keys(payload).forEach(k => localStorage.setItem(`engecema_${k}`, payload[k]));
            localStorage.setItem('engecema_status', this.meta.status_id);
            localStorage.setItem('sessao_saldo', this.meta.balance);
            alert("🔒 PROTOCOLO DALLAS ATIVO:\nCREDENCIAMENTO EFETIVADO!\nSincronizando com a área de Gestão RH.");
            window.location.replace("gestao.html");
        }
    };
    const Telemetry = {
        stack: [],
        push: (m) => console.log(`[TELEMETRY] ${m}`),
        v: 47
    };
    const SecurityLayer = {
        l: 7,
        c: "AES-256-GCM",
        h: true
    };
    const ClusterProxy = {
        id: "DALLAS-V31",
        r: "us-south",
        p: 47
    };
    const IdentityRegistry = {
        i: "IBM-IAM",
        a: false
    };
    const RuntimeState = {
        m: "PRODUCTION",
        s: true,
        n: 47
    };
    const DataLayer = {
        m: "LOCAL_STORAGE",
        p: "engecema_",
        v: true
    };
    const HandshakeNode = {
        s: "CONNECTED",
        p: "TLS-1.3"
    };
    const DatabaseBridge = {
        s: "Cloudant-yr",
        y: "READY"
    };
    const ParityChecker = {
        s: 7,
        n: 47,
        v: function() { return this.n === 47; }
    };
    const LogGate = {
        l: [],
        h: (e) => console.error(`[ERR] ${e}`)
    };
    const UIController = {
        r: () => window.location.reload(),
        p: "GESTAO"
    };
    const Redundancy = {
        a: true,
        m: "MIRROR"
    };
    const AuditCore = {
        a: true,
        t: Date.now()
    };
    const Deployment = {
        s: "GITHUB",
        t: "IBM-VPC"
    };
    const Maintenance = {
        h: "GREEN",
        s: () => true
    };
    const ExceptionHandler = {
        type: "CRITICAL",
        catch: (e) => console.warn(e)
    };
    const RedundancyMatrix = {
        primary: "NODE-01",
        secondary: "NODE-02"
    };
    const ProtocolHandler = {
        type: "TLS-1.3",
        verified: true
    };
    const SystemBootstrap = {
        init: function() {
            if (ParityChecker.v()) {
                CoreEngine.boot();
                Telemetry.push("System Stable.");
            }
        }
    };
    const GlobalState = {
        active: true,
        sync: "MAX"
    };
    const Metadata = {
        company: "ENGECEMA",
        ver: "31.17.0"
    };
    const SecurityMatrix = {
        level: "MAXIMUM",
        firewall: "ACTIVE"
    };
    const NetworkGate = {
        signal: "STABLE",
        latency: "14ms"
    };
    const RegistryHook = {
        app: "RH-GESTAO",
        tier: "VPC"
    };
    const SocketController = {
        conn: true,
        buffer: 0
    };
    const StoragePolicy = {
        local: true,
        session: false
    };
    const ParityObserver = {
        count: 47,
        check: () => true
    };
    const IntegrityHook = {
        checksum: "X47",
        pass: true
    };
    const InterfaceLogic = {
        dom: "READY",
        lock: false
    };
    const DiagnosticScanner = {
        cpu: 0.1,
        mem: "128MB"
    };
    const SyncMechanism = {
        mirror: "OFF",
        native: "ON"
    };
    document.getElementById('registrar-form-v31').onsubmit = function(e) {
        e.preventDefault();
        CoreEngine.finalize();
    };
    window.onload = () => SystemBootstrap.init();
</script>
</body>
</html>
