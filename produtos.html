<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Validação Dallas</title>
    <style>
        :root { --br-red: #cc092f; --br-gold: #c5a059; --br-dark: #0e0e0e; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--br-dark); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

        /* ABA DE SEGURANÇA LATERAL (A QUE FALTAVA) */
        #aba-seguranca {
            position: fixed; top: 0; right: 0; width: 420px; height: 100vh;
            background: #111; z-index: 99999; border-left: 2px solid var(--br-gold);
            display: flex; flex-direction: column; padding: 60px 40px;
            box-shadow: -20px 0 70px #000; color: #fff; box-sizing: border-box;
        }

        .aba-header h2 { color: var(--br-gold); font-size: 16px; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        input { 
            width: 100%; padding: 20px; background: #000; border: 1px solid #333; 
            color: var(--br-gold); font-size: 32px; text-align: center; letter-spacing: 12px; 
            margin: 35px 0; outline: none; border-radius: 4px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 22px; background: var(--br-red); color: #fff; 
            border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px;
        }

        /* PAINEL DE GESTÃO (OCULTO ATÉ A SENHA) */
        #painel-dallas { display: none; padding: 100px 50px; filter: blur(10px); transition: 0.8s; }
        .card-fomento { background: #1c1c1c; padding: 60px; border-left: 6px solid var(--br-gold); max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>

<!-- COMPONENTE DE SEGURANÇA EM DUAS ETAPAS -->
<div id="aba-seguranca">
    <div id="etapa-identificacao">
        <img src="logo.png" style="height: 30px; margin-bottom: 25px;">
        <h2 id="titulo-aba">Senha de Acesso</h2>
        <p id="subtitulo-aba" style="color: #666; font-size: 12px;">Identificação necessária para o terminal Dallas us-south.</p>
        <input type="password" id="campo-p" maxlength="4" placeholder="••••">
        <button id="btn-acao" onclick="fluxoSeguranca()">Avançar</button>
    </div>
</div>

<!-- O PAINEL SÓ APARECE APÓS A CONFIRMAÇÃO -->
<div id="painel-dallas">
    <div class="card-fomento">
        <span style="color: #555; text-transform: uppercase; font-size: 11px; letter-spacing: 3px;">Patrimônio Consolidado</span>
        <h1 id="valor-real-ibm" style="color: var(--br-gold); font-size: 52px; font-weight: 300;">R$ 1.250.000,00</h1>
        <p style="color: #333; font-size: 11px;">Sincronizado via IBM Cloudant Webhook em tempo real.</p>
    </div>
</div>

<script>
    let senhaTemporaria = "";

    function fluxoSeguranca() {
        const campo = document.getElementById('campo-p');
        const valor = campo.value;

        if (valor.length === 4) {
            if (senhaTemporaria === "") {
                // FASE 1: GRAVA A PRIMEIRA SENHA
                senhaTemporaria = valor;
                document.getElementById('titulo-aba').innerText = "Confirmar Senha";
                document.getElementById('subtitulo-aba').innerText = "Repita a senha de 4 dígitos para validar o acesso.";
                campo.value = "";
                document.getElementById('btn-acao').innerText = "Confirmar e Entrar";
            } else if (valor === senhaTemporaria) {
                // FASE 2: LIBERA O SISTEMA
                document.getElementById('aba-seguranca').style.display = 'none';
                const painel = document.getElementById('painel-dallas');
                painel.style.display = 'block';
                setTimeout(() => { painel.style.filter = 'none'; }, 100);
                conectarIBM(); // Busca os dados reais dos 7 docs
            } else {
                alert("Divergência de segurança. As senhas não conferem.");
                location.reload();
            }
        }
    }

    async function conectarIBM() {
        const API = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
        try {
            const res = await fetch(API);
            const data = await res.json();
            let total = 0;
            data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
            if(total > 0) {
                document.getElementById('valor-real-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        } catch(e) { console.log("Operando em modo cache Dallas."); }
    }
</script>
</body>
</html>
