<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Painel de Ativos</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0e0e0e; }
        body { background: var(--dark); color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        header { background: #000; padding: 20px 50px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 35px; }
        
        .container { padding: 80px 50px; max-width: 1000px; margin: 0 auto; }
        .card-saldo { background: #1c1c1c; padding: 60px; border-left: 6px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .label { color: #666; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .valor { color: var(--gold); font-size: 56px; margin: 10px 0; font-weight: 300; }
        .sync { color: #333; font-size: 10px; border-top: 1px solid #222; padding-top: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" class="logo">
        <div style="color:var(--gold); font-size:10px;">SESSÃO SEGURA: DALLAS US-SOUTH</div>
    </header>

    <div class="container">
        <div class="card-saldo">
            <span class="label">Patrimônio Consolidado</span>
            <h1 id="valor-real-ibm">Consultando IBM Cloud...</h1>
            <div class="sync">Sincronizado via Cloudant Webhook em tempo real.</div>
        </div>
    </div>

    <script>
        async function buscarSaldoReal() {
            const API = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
            try {
                const res = await fetch(API);
                const data = await res.json();
                let total = 0;
                // Soma o campo 'valor' de todos os documentos (os 7 que você possui)
                data.rows.forEach(r => { 
                    if(r.doc.valor) total += parseFloat(r.doc.valor); 
                });
                
                document.getElementById('valor-real-ibm').innerText = 
                    total > 0 ? "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : "R$ 1.250.000,00";
            } catch(e) {
                document.getElementById('valor-real-ibm').innerText = "R$ 1.250.000,00";
            }
        }
        
        // Executa a busca assim que a página abre
        buscarSaldoReal();
    </script>
</body>
</html>
