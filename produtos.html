<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private | Home Banking</title>
    <style>
        :root { --red: #cc092f; --gold: #c5a059; --dark: #0b0b0b; --card: #161616; }
        body { background: var(--dark); color: #fff; font-family: Arial, sans-serif; margin: 0; }
        header { background: #000; padding: 15px 40px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; }
        .container { padding: 30px 40px; max-width: 1100px; margin: 0 auto; }
        .card-saldo { background: var(--card); padding: 30px; border-left: 5px solid var(--gold); margin-bottom: 30px; }
        .menu-servicos { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 30px; }
        .servico-item { background: var(--card); padding: 20px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .servico-item:hover { border-color: var(--gold); background: #222; }
        .grid-banco { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .bloco { background: var(--card); padding: 20px; border: 1px solid #222; }
        .btn-acao { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--red); color: var(--red); cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-acao:hover { background: var(--red); color: white; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" style="height:25px;">
        <span style="color:var(--gold); font-size:12px;">DALLAS US-SOUTH</span>
    </header>

    <div class="container">
        <div class="card-saldo">
            <small style="color:#666">SALDO DISPONÍVEL</small>
            <h1 id="valor-real-ibm" style="color:var(--gold); font-size:42px;">R$ 0,00</h1>
        </div>

        <div class="menu-servicos">
            <div class="servico-item" onclick="acao('PIX')">PIX</div>
            <div class="servico-item" onclick="acao('Extrato')">Extrato</div>
            <div class="servico-item" onclick="acao('Transferir')">Transferir</div>
            <div class="servico-item" onclick="acao('TED/DOC')">TED/DOC</div>
            <div class="servico-item" onclick="acao('Pagamentos')">Contas</div>
            <div class="servico-item" onclick="acao('Cartões')">Cartões</div>
        </div>

        <div class="grid-banco">
            <div class="bloco">
                <h4 style="color:var(--gold)">INVESTIMENTOS</h4>
                <p style="font-size:12px;">CDB Private: 112% CDI</p>
                <button class="btn-acao" onclick="acao('Investimento CDB')">Aplicar</button>
            </div>
            <div class="bloco">
                <h4 style="color:var(--gold)">EMPRÉSTIMOS</h4>
                <p style="font-size:12px;">Capital Giro: Sob Consulta</p>
                <button class="btn-acao" onclick="acao('Financiamento')">Simular</button>
            </div>
            <div class="bloco">
                <h4 style="color:var(--gold)">CÂMBIO</h4>
                <p style="font-size:12px;">Dólar Comercial: R$ 4,92</p>
                <button class="btn-acao" onclick="acao('Câmbio')">Comprar</button>
            </div>
        </div>
    </div>

    <script>
        function acao(tipo) { alert("Iniciando operação: " + tipo + "\\nTerminal Dallas aguardando autorização..."); }

        async function buscarSaldo() {
            try {
                const res = await fetch('https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud');
                const data = await res.json();
                let total = 0;
                data.rows.forEach(r => { if(r.doc.valor) total += parseFloat(r.doc.valor); });
                document.getElementById('valor-real-ibm').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            } catch(e) { document.getElementById('valor-real-ibm').innerText = "R$ 1.250.000,00"; }
        }
        buscarSaldo();
    </script>
</body>
</html>
