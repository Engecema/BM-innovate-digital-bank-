<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco Private | Validação de Acesso</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
            --card-gray: #1c1c1c;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: Arial, sans-serif; overflow: hidden; }

        /* 1. ABA DE SENHA (A CAMADA QUE FALTAVA NO FLUXO) */
        #camada-senha {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .caixa-validacao {
            background: #111; padding: 45px; border-top: 5px solid var(--bradesco-red);
            width: 380px; text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,1);
        }

        .caixa-validacao h2 { color: var(--private-gold); font-size: 13px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }

        input[type="password"] {
            width: 100%; padding: 18px; background: #222; border: 1px solid #333;
            color: var(--private-gold); text-align: center; font-size: 24px; margin-bottom: 25px; border-radius: 4px; outline: none;
        }

        .btn-validar {
            width: 100%; padding: 18px; background: var(--bradesco-red); color: white;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px;
        }

        /* 2. PAINEL DE GESTÃO (OCULTO ATÉ A VALIDAÇÃO) */
        #painel-dallas { display: none; padding-top: 80px; }

        header {
            background: #000; border-bottom: 1px solid var(--private-gold);
            padding: 15px 50px; display: flex; justify-content: space-between;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .card-valor {
            background: var(--card-gray); padding: 60px; margin: 40px auto; max-width: 1200px;
            border-left: 6px solid var(--private-gold); box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .card-valor h1 { color: var(--private-gold); font-size: 52px; margin: 15px 0; font-weight: 300; }
        .session-tag { color: var(--private-gold); font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<!-- TELA DE SEGURANÇA: INTERCEPTA O CLIQUE EM "OK" -->
<div id="camada-senha">
    <div class="caixa-validacao">
        <img src="logo.png" alt="Bradesco Private" style="height: 35px; margin-bottom: 30px;">
        <h2>Identificação Digital Requerida</h2>
        <input type="password" id="senha-digitos" placeholder="••••" maxlength="4">
        <button class="btn-validar" onclick="concederAcesso()">Confirmar e Acessar</button>
        <p id="erro-msg" style="color: #ff3333; font-size: 11px; margin-top: 15px; display: none;">Chave de segurança inválida.</p>
    </div>
</div>

<!-- CONTEÚDO DE PRODUÇÃO: SÓ APARECE APÓS A SENHA -->
<div id="painel-dallas">
    <header>
        <img src="logo.png" alt="Bradesco Private" style="height: 35px;">
        <div class="session-tag">● AMBIENTE CRIPTOGRAFADO: DALLAS (US-SOUTH)</div>
    </header>

    <main class="card-valor">
        <span style="color: #666; text-transform: uppercase; font-size: 11px; letter-spacing: 3px;">Patrimônio Consolidado sob Gestão</span>
        <h1 id="saldo-ibm">R$ 1.250.000,00</h1>
        <p style="color: #444; font-size: 12px; margin: 0;">Sincronizado via Cloudant Webhook.</p>
    </main>
</div>

<script>
    // FUNÇÃO QUE LIBERA O PAINEL E BUSCA DADOS NA IBM
    function concederAcesso() {
        const pass = document.getElementById('senha-digitos').value;
        
        // Simulação de trava: digite qualquer senha de 4 dígitos para entrar
        if (pass.length >= 4) { 
            document.getElementById('camada-senha').style.display = 'none';
            document.getElementById('painel-dallas').style.display = 'block';
            document.body.style.overflow = 'auto';
            carregarDadosCloudant(); // Só conecta ao banco APÓS a senha
        } else {
            document.getElementById('erro-msg').style.display = 'block';
        }
    }

    // CONEXÃO COM O ENDPOINT CLOUDANT
    const ENDPOINT_IBM = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';

    async function carregarDadosCloudant() {
        try {
            const res = await fetch(ENDPOINT_IBM);
            const data = await res.json();
            const documentos = data.rows.map(r => r.doc);

            let somaTotal = 0;
            documentos.forEach(doc => { if(doc.valor) somaTotal += parseFloat(doc.valor); });

            if (somaTotal > 0) {
                document.getElementById('saldo-ibm').innerText = `R$ ${somaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            }
        } catch (e) {
            console.log("Acesso via Dallas Engine Offline.");
        }
    }
</script>

</body>
</html>
