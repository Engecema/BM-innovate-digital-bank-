<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bradesco Private | Validação de Acesso</title>
    <style>
        :root {
            --bradesco-red: #cc092f;
            --private-gold: #c5a059;
            --bg-dark: #0e0e0e;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: Arial, sans-serif; overflow: hidden; }

        /* 1. CORTINA DE SEGURANÇA (BLOQUEIA TUDO) */
        #cortina-seguranca {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999; display: flex; justify-content: flex-end;
        }

        /* 2. ABA DE SENHA LATERAL (ESPELHAMENTO FIEL) */
        .aba-senha-lateral {
            width: 400px; height: 100%; background: #111;
            border-left: 1px solid var(--private-gold);
            padding: 60px 40px; box-shadow: -20px 0 50px rgba(0,0,0,1);
            display: flex; flex-direction: column;
        }

        .aba-senha-lateral img { height: 30px; margin-bottom: 30px; width: fit-content; }
        .aba-senha-lateral h2 { color: var(--private-gold); font-size: 16px; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
        .aba-senha-lateral p { color: #666; font-size: 12px; line-height: 1.6; margin-bottom: 30px; }

        input[type="password"] {
            width: 100%; padding: 20px; background: #000; border: 1px solid #333;
            color: var(--private-gold); font-size: 32px; text-align: center; letter-spacing: 15px;
            margin-bottom: 25px; outline: none; border-radius: 4px;
        }

        .btn-confirmar {
            background: var(--bradesco-red); color: white; border: none;
            padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            border-radius: 4px; transition: 0.3s;
        }

        .btn-confirmar:hover { background: #a30725; }

        /* 3. PAINEL DE GESTÃO (INVISÍVEL ATÉ A SENHA) */
        #painel-producao { display: none; padding: 80px 50px; }
        
        .card-patrimonio {
            background: #1c1c1c; padding: 60px; border-left: 5px solid var(--private-gold);
            max-width: 900px; margin: 0 auto;
        }
    </style>
</head>
<body>

<!-- COMPONENTE: ABA DE SENHA INTERCEPTADORA -->
<div id="cortina-seguranca">
    <div class="aba-senha-lateral">
        <img src="logo.png" alt="Bradesco Private">
        <h2>Senha de Acesso</h2>
        <p>Olá! Para acessar sua conta Engecema Private, informe sua senha de 4 dígitos para validação de segurança no terminal us-south Dallas.</p>
        
        <input type="password" id="campo-senha" maxlength="4" placeholder="••••">
        <button class="btn-confirmar" onclick="validarFluxo()">Acessar Conta</button>
        
        <div id="erro" style="color: var(--bradesco-red); font-size: 11px; margin-top: 20px; display: none; text-align: center;">
            Senha inválida. Tente novamente ou contate seu gerente.
        </div>
    </div>
</div>

<!-- CONTEÚDO QUE SÓ SURGE APÓS A ABA SER VALIDADA -->
<div id="painel-producao">
    <div class="card-patrimonio">
        <span style="color: #555; text-transform: uppercase; font-size: 11px; letter-spacing: 2px;">Patrimônio Consolidado</span>
        <h1 id="valor-ibm" style="color: var(--private-gold); font-size: 50px; margin: 15px 0;">R$ 1.250.000,00</h1>
        <p style="color: #333; font-size: 11px;">Sincronizado com IBM Cloudant via Webhook</p>
    </div>
</div>

<script>
    function validarFluxo() {
        const senha = document.getElementById('campo-senha').value;
        
        // Simulação: se digitar 4 números, a aba "some" e o painel "aparece"
        if(senha.length === 4) {
            document.getElementById('cortina-seguranca').style.display = 'none';
            document.getElementById('painel-producao').style.display = 'block';
            document.body.style.overflow = 'auto';
            conectarIBM(); // Dispara a conexão com Cloudant apenas aqui
        } else {
            document.getElementById('erro').style.display = 'block';
        }
    }

    async function conectarIBM() {
        const URL = 'https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud';
        try {
            const res = await fetch(URL);
            const data = await res.json();
            const docs = data.rows.map(r => r.doc);
            let total = 0;
            docs.forEach(d => { if(d.valor) total += parseFloat(d.valor); });
            if (total > 0) {
                document.getElementById('valor-ibm').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            }
        } catch (e) { console.log("Offline Dallas"); }
    }
</script>

</body>
</html>
