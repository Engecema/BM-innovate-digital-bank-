name: Integracao IBM Cloud

on:
  push:
    branches: [ main, master ]

jobs:
  banco-digital-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm install @ibm-cloud/cloudant ibm-cloud-sdk-core

      - name: PASSO PIX - Enviar Pagamento Instantaneo
        run: node enviar-pix.js
        env:
          CLOUDANT_API_KEY: ${{ secrets.CLOUDANT_API_KEY }}
          CLOUDANT_URL: ${{ secrets.CLOUDANT_URL }}

      - name: CONSULTA - Saldo Pos-Pix
        run: node consultar-saldo.js
        env:
          CLOUDANT_API_KEY: ${{ secrets.CLOUDANT_API_KEY }}
          CLOUDANT_URL: ${{ secrets.CLOUDANT_URL }}
