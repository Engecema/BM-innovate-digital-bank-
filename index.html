<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema - Global Banking & Security</title>
    <style>
        :root { --emerald: #2ecc71; --dark: #27ae60; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--emerald); }
        .brand { font-size: 28px; font-weight: 800; color: var(--emerald); text-align: center; margin-bottom: 20px; }
        
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .service-item { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; font-weight: 600; font-size: 13px; }
        .service-item:hover { border-color: var(--emerald); transform: scale(1.02); }
        .service-item span { display: block; font-size: 30px; margin-bottom: 10px; }

        /* MOTOR DE SEGURANÇA (MODAL MFA) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; position: relative; }
        
        .btn-action { background: var(--emerald); color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #edf2f4; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="card" style="max-width: 400px; margin: 80px auto; border-left: none;">
            <div class="brand">Engecema</div>
            <input type="text" id="user-cpf" placeholder="000.000.000-00" maxlength="14">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn-action" onclick="fluxoLogin()">Acessar Global Banking</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="screen-dash" class="screen">
        <div class="brand" style="text-align:left">Engecema</div>
        <div class="card">
            <p style="color:#7f8c8d; margin:0; font-size: 14px;">Saldo Consolidado (BRL)</p>
            <h1 id="saldo" style="color:var(--dark); margin:5px 0; font-size: 36px;">R$ 0,00</h1>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="solicitarAcao('Pix', 500)"><span>💠</span>Pix</div>
            <div class="service-item" onclick="solicitarAcao('Interbancário', 3000)"><span>🏦</span>Inter-Bancos</div>
            <div class="service-item" onclick="solicitarAcao('Internacional', 10000)"><span>🌎</span>Empréstimo Int.</div>
            <div class="service-item" onclick="solicitarAcao('Imóveis', 150000)"><span>🏠</span>Imóveis</div>
            <div class="service-item" onclick="solicitarAcao('Veículos', 50000)"><span>🚗</span>Veículos</div>
            <div class="service-item" onclick="solicitarAcao('Investir', 5000)"><span>📈</span>Investimentos</div>
        </div>

        <h3 style="margin-top:30px;">Segurança & Extrato</h3>
        <div id="lista-transacoes" class="card" style="border-left-color: #3498db; font-size: 14px;">Conectado à IBM Cloud via SSL Seguro.</div>
    </div>

    <!-- MODAL DO MOTOR DE SEGURANÇA -->
    <div id="modal-seguranca" class="modal">
        <div class="modal-content">
            <h3 id="mfa-titulo" style="color:var(--emerald)">Validação Engecema</h3>
            <p id="mfa-desc"></p>
            <div id="mfa-corpo"></div>
            <button class="btn-action" onclick="confirmarOperacao()">Confirmar Operação</button>
            <button onclick="fecharMFA()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const CONFIG = Object.freeze({ API_URL: 'https://api.engecema.ibmcloud.com' });
        let acaoPendente = null;

        // MOTOR DE REGRAS ADAPTATIVO
        function solicitarAcao(tipo, valor) {
            acaoPendente = { tipo, valor };
            const modal = document.getElementById('modal-seguranca');
            const corpo = document.getElementById('mfa-corpo');
            const desc = document.getElementById('mfa-desc');
            modal.style.display = 'flex';

            if (tipo === 'Internacional') {
                desc.textContent = "Operação Global detectada. Confirme o Token MFA e a Taxa de Câmbio.";
                corpo.innerHTML = `<input type="text" placeholder="Token de 6 dígitos" maxlength="6" style="text-align:center; font-size:24px;">
                                   <p style="font-size:12px; color:blue;">Taxa aplicada: PTAX + 1.2%</p>`;
            } else if (tipo === 'Interbancário') {
                desc.textContent = "Conectando ao Open Banking. Autorize o compartilhamento de dados.";
                corpo.innerHTML = `<div style="text-align:left; font-size:12px; padding:10px; border:1px solid #eee; border-radius:10px;">
                                    [ ] Autorizo Engecema a consultar outros bancos.<br>
                                    [ ] Aceito os termos de portabilidade de crédito.
                                   </div>`;
            } else {
                desc.textContent = "Valide sua Biometria para processar: " + tipo;
                corpo.innerHTML = `<div style="font-size:50px;">🖐️</div>`;
            }
        }

        function confirmarOperacao() {
            alert(`Ação de ${acaoPendente.tipo} enviada para processamento na IBM Cloud.`);
            fecharMFA();
        }

        function fecharMFA() { document.getElementById('modal-seguranca').style.display = 'none'; }

        async function fluxoLogin() {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
            document.getElementById('saldo').textContent = "R$ 84.550,00";
        }
    </script>
</body>
</html>
