<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate | Brokerage</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .asset-card { background: #111; border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; border: 1px solid #333; margin-bottom: 15px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .btn-report { background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; max-width: 340px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .report-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 40px 20px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 25px;">
        <div style="font-size: 0.8rem; color: #888;">Patrimônio sob Custódia</div>
        <div style="font-size: 2.2rem; font-weight: bold; color: #27ae60;">R$ 4.627,02</div>
    </div>

    <!-- Cofre de Ativos -->
    <div class="asset-card">
        <small style="color: #27ae60; font-weight: bold;">🛡️ COFRE DE ATIVOS</small>
        <div class="asset-item">
            <span>₿ Bitcoin (BTC)</span>
            <strong>R$ 1.250,00</strong>
        </div>
        <div class="asset-item">
            <span>🍎 Apple (AAPL)</span>
            <strong>R$ 1.840,00</strong>
        </div>
    </div>

    <button class="btn-report" onclick="gerarInforme()">📄 Informe de Rendimentos 2024</button>

    <!-- Overlay do Informe -->
    <div id="overlay" class="report-overlay" onclick="this.style.display='none'">
        <div style="background: #fff; color: #000; padding: 30px; border-radius: 15px; text-align: left;">
            <h3 style="margin-top: 0; color: #27ae60;">INFORME DE RENDIMENTOS</h3>
            <p><strong>Titular:</strong> Geonimatos</p>
            <p><strong>Patrimônio:</strong> R$ 4.627,02</p>
            <p><strong>Rendimentos Isentos:</strong> R$ 145,20</p>
            <hr>
            <p style="font-size: 0.7rem; color: #666;">Documento gerado pela IA Innovate Bank para fins de declaração.</p>
        </div>
    </div>

    <script>
        function gerarInforme() {
            document.getElementById('overlay').style.display = 'block';
        }
    </script>
</body>
</html>
