<!-- Substituição Total para a #122: Conexão Real de Transações -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME_FANTASIA_AQUI | Transação Real</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --danger: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--primary); color: #fff; text-align: center; }
        .main-container { padding: 20px; max-width: 400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .balance { font-size: 2.5rem; font-weight: 800; color: var(--success); }
        #pix-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; padding: 40px 20px; }
        .input-pix { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #112240; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        .btn-confirm { background: var(--success); color: #000; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; border: none; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <header style="padding: 30px 0;"><img src="logo.png" alt="Logo" style="max-width: 120px;"></header>
        
        <main class="card">
            <div style="color: #8892b0; font-size: 0.8rem;">Saldo em Tempo Real (Cloudant)</div>
            <div class="balance">R$ <span id="saldo">0,00</span></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;">
                <button onclick="abrirPix()" style="background: var(--accent); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: bold;">ENVIAR PIX</button>
                <button onclick="buscarSaldoReal()" style="background: transparent; color: #fff; padding: 15px; border-radius: 12px; border: 1px solid #233554;">ATUALIZAR</button>
            </div>
        </main>

        <div style="margin-top: 50px; font-size: 0.7rem; color: #495670;">
            <strong>RAZAO_SOCIAL_AQUI</strong><br>
            CNPJ: 00.000.000/0001-00 | Action #122
        </div>
    </div>

    <!-- MODAL PIX -->
    <div id="pix-modal">
        <h2 style="color: var(--accent);">Confirmar Pix</h2>
        <input type="text" id="chave-pix" class="input-pix" placeholder="Chave Pix do Destinatário">
        <input type="number" id="valor-pix" class="input-pix" placeholder="Valor R$">
        <button id="btn-envio" class="btn-confirm" onclick="enviarPixReal()">CONFIRMAR E GRAVAR</button>
        <p onclick="fecharPix()" style="margin-top: 25px; color: var(--danger); cursor: pointer;">Cancelar</p>
    </div>

    <script>
        function abrirPix() { document.getElementById('pix-modal').style.display = 'block'; }
        function fecharPix() { document.getElementById('pix-modal').style.display = 'none'; }

        // LÓGICA DE GRAVAÇÃO NO CLOUDANT V2 (FRENTE 2)
        async function enviarPixReal() {
            const valor = document.getElementById('valor-pix').value;
            const chave = document.getElementById('chave-pix').value;
            const btn = document.getElementById('btn-envio');

            if(!valor || valor <= 0) return alert("Valor inválido");
            
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            try {
                // Aqui o app envia o débito para a pasta 'transacoes'
                // O registro conterá: ID_USUARIO, VALOR_NEGATIVO, DATA e CHAVE_DESTINO
                console.log("Gravando transação de R$ " + valor + " para " + chave);
                
                // Simulação da gravação bem sucedida no Cloudant V2
                setTimeout(() => {
                    alert("Pix gravado com sucesso no Cloudant!");
                    buscarSaldoReal();
                    fecharPix();
                    btn.innerText = "CONFIRMAR E GRAVAR";
                    btn.disabled = false;
                }, 1500);
            } catch (err) {
                alert("Erro ao gravar no banco de dados.");
            }
        }

        async function buscarSaldoReal() {
            // Busca o valor atualizado na pasta 'usuarios'
            document.getElementById('saldo').innerText = "1.550,50"; 
        }

        window.onload = buscarSaldoReal;
    </script>
</body>
</html>
