<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Innovate Bank | Reservas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e8f5e9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #fff; border-radius: 28px; width: 340px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #27ae60; margin-bottom: 20px; }
        .reserva-box { background: #f1f8e9; border: 1px dashed #27ae60; border-radius: 20px; padding: 20px; text-align: left; width: 340px; box-sizing: border-box; }
        .reserva-valor { font-size: 1.5rem; font-weight: bold; color: #1b5e20; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="color: #27ae60; font-weight: bold;">INNOVATE BANK</div>
        <p style="font-size: 0.8rem; color: #666;">Saldo disponível</p>
        <div style="font-size: 2rem; font-weight: bold;">R$ 1.535,52</div>
    </div>

    <div class="reserva-box">
        <span style="color: #27ae60; font-weight: bold; font-size: 0.8rem;">🛡️ RESERVA DE EMERGÊNCIA</span>
        <div class="reserva-valor">R$ 1.500,00</div>
        <p style="font-size: 0.7rem; color: #666;">Dinheiro protegido e rendendo 100% do CDI.</p>
        <button style="background: #27ae60; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px;">Resgatar</button>
    </div>
</body>
</html>
