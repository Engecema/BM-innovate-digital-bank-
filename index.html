<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema - Global Banking System</title>
    <style>
        :root { --emerald: #2ecc71; --dark: #27ae60; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS E UI */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--emerald); position: relative; }
        .brand { font-size: 28px; font-weight: 800; color: var(--emerald); text-align: center; margin-bottom: 20px; }
        
        /* GRID DE SERVIÇOS */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .service-item { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; font-weight: 600; font-size: 12px; }
        .service-item:hover { border-color: var(--emerald); transform: translateY(-5px); }
        .service-item span { display: block; font-size: 28px; margin-bottom: 8px; }

        /* INFOS DE CÂMBIO */
        .cambio-info { font-size: 12px; color: #27ae60; background: #e8f8f5; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px dashed #2ecc71; text-align: left; }

        /* BOTÕES E INPUTS */
        .btn-action { background: var(--emerald); color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-secondary { background: none; border: 2px solid var(--emerald); color: var(--emerald); padding: 14px; border-radius: 30px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #edf2f4; border-radius: 12px; font-size: 16px; box-sizing: border-box; }

        /* MODAL DE SEGURANÇA MFA */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; position: relative; }
    </style>
</head>
<body>

    <!-- TELA 1: LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="card" style="max-width: 400px; margin: 60px auto; border:none; text-align:center;">
            <div class="brand">Engecema</div>
            <input type="text" id="login-cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-action" onclick="fluxoLogin()">Acessar Conta</button>
            <button class="btn-secondary" onclick="mudarTela('screen-cadastro')">Abrir Nova Conta</button>
        </div>
    </div>

    <!-- TELA 2: CADASTRO -->
    <div id="screen-cadastro" class="screen">
        <div class="card" style="max-width: 450px; margin: 40px auto;">
            <h2 style="color:var(--emerald); text-align:center;">Seja Engecema</h2>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="email" id="cad-email" placeholder="E-mail Corporativo">
            <input type="text" id="cad-cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
            <button class="btn-action" onclick="iniciarValidacao()">Cadastrar e Validar E-mail</button>
            <button class="btn-secondary" style="border:none;" onclick="mudarTela('screen-login')">Voltar</button>
        </div>
    </div>

    <!-- TELA 3: DASHBOARD INTEGRAL -->
    <div id="screen-dash" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="brand" style="margin:0">Engecema</div>
            <div style="cursor:pointer;" onclick="alert('Sistema monitorado via IBM Cloudant SSL.')">🔔</div>
        </div>

        <div class="card">
            <p style="color:#7f8c8d; margin:0; font-size: 14px;">Saldo Consolidado Global</p>
            <h1 id="saldo" style="color:var(--dark); margin:5px 0; font-size: 38px;">R$ 142.880,50</h1>
            <small style="color:var(--emerald)">● Conta Global Ativa</small>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="solicitarAcao('Pix', 500)"><span>💠</span>Pix</div>
            <div class="service-item" onclick="solicitarAcao('Interbancário', 5000)"><span>🏦</span>Inter-Bancos</div>
            <div class="service-item" onclick="solicitarAcao('Remessa Internacional', 15000)"><span>🌍</span>Câmbio Int.</div>
            <div class="service-item" onclick="solicitarAcao('Investimento', 1000)"><span>📈</span>Investir</div>
            <div class="service-item" onclick="solicitarAcao('Financiamento', 200000)"><span>🏠</span>Imóveis</div>
            <div class="service-item" onclick="alert('Cartão Virtual Ativo')"><span>💳</span>Cartões</div>
        </div>

        <h3 style="margin-top:30px;">Histórico</h3>
        <div id="extrato" class="card" style="border-left-color: #3498db; font-size:13px;">
            Sincronizando com IBM Cloudant...
        </div>

        <button onclick="location.reload()" style="width:100%; background:#eee; border:none; padding:12px; border-radius:20px; cursor:pointer; margin-top:20px;">Encerrar Sessão</button>
    </div>

    <!-- MODAL DO MOTOR DE SEGURANÇA MFA -->
    <div id="modal-seguranca" class="modal">
        <div class="modal-content">
            <h3 id="mfa-titulo" style="color:var(--emerald); margin-top:0;">Segurança Engecema</h3>
            <p id="mfa-desc" style="font-size:14px;"></p>
            <div id="mfa-corpo"></div>
            <button class="btn-action" onclick="confirmarOperacao()">Confirmar Operação</button>
            <button onclick="fecharMFA()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const CONFIG = Object.freeze({ API_URL: 'https://api.engecema.ibmcloud.com' });
        let acaoPendente = null;

        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function iniciarValidacao() {
            alert("Token de segurança enviado ao e-mail cadastrado.");
            mudarTela('screen-dash');
        }

        function fluxoLogin() {
            mudarTela('screen-dash');
            document.getElementById('extrato').innerHTML = "● Recebido via IBM Cloud: + R$ 5.000,00<br>● Compra Cartão Virtual: - R$ 149,90";
        }

        /* MOTOR DE SEGURANÇA ADAPTATIVO (MFA + CAMADAS) */
        function solicitarAcao(tipo, valor) {
            acaoPendente = { tipo, valor };
            const m = document.getElementById('modal-seguranca');
            const d = document.getElementById('mfa-desc');
            const c = document.getElementById('mfa-corpo');
            m.style.display = 'flex';

            if (tipo === 'Remessa Internacional' || valor > 10000) {
                d.textContent = "Operação de alto risco detectada. Assinatura Digital e Token MFA requeridos.";
                c.innerHTML = `
                    <div class="cambio-info">
                        Cotativo: <b>1 USD = 5,12 BRL</b><br>
                        Taxas Swift e IOF inclusos.
                    </div>
                    <input type="text" placeholder="Token 6 dígitos" maxlength="6" style="text-align:center; font-size:24px; letter-spacing:10px;">
                `;
            } else {
                d.textContent = "Valide esta operação usando sua Biometria Engecema.";
                c.innerHTML = `<div style="font-size:50px; margin:20px 0;">🛡️</div>`;
            }
        }

        function confirmarOperacao() {
            if(acaoPendente.tipo === 'Remessa Internacional') {
                alert("SIMULAÇÃO DE TRANSFERÊNCIA INTERNACIONAL CONCLUÍDA!\n\nValor enviado para processamento Swift na IBM Cloud.");
            } else {
                alert("Operação realizada com sucesso!");
            }
            fecharMFA();
        }

        function fecharMFA() { document.getElementById('modal-seguranca').style.display = 'none'; }
    </script>
</body>
</html>
