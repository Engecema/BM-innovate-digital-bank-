<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate Super App</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .push-notificacao { background: #333; border-left: 5px solid #27ae60; padding: 15px; border-radius: 12px; width: 100%; max-width: 360px; margin-bottom: 20px; font-size: 0.8rem; animation: slideIn 0.5s ease-out; }
        .card-app { background: #111; border-radius: 25px; padding: 25px; width: 100%; max-width: 360px; border: 1px solid #222; margin-bottom: 20px; }
        .grafico-container { margin-top: 20px; text-align: left; }
        .barra-gasto { height: 10px; border-radius: 5px; background: #222; margin-bottom: 10px; position: relative; }
        .preenchimento { height: 100%; border-radius: 5px; background: #27ae60; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="alerta" class="push-notificacao">
        <strong>🔔 Notificação:</strong><br>
        Processando última transação...
    </div>

    <div class="card-app">
        <small style="color: #666;">Saldo em conta</small>
        <div style="font-size: 2rem; font-weight: bold; color: #27ae60;">R$ 1.535,52</div>
        
        <div class="grafico-container">
            <small style="color: #aaa;">Gastos por Categoria</small>
            <div style="font-size: 0.7rem; margin: 10px 0 5px;">Lazer (R$ 150,00)</div>
            <div class="barra-gasto"><div class="preenchimento" style="width: 40%;"></div></div>
            <div style="font-size: 0.7rem; margin: 10px 0 5px;">Mercado (R$ 400,00)</div>
            <div class="barra-gasto"><div class="preenchimento" style="width: 70%;"></div></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('alerta').innerHTML = "<strong>🔔 Notificação:</strong><br>Você gastou R$ 150,00 em Lazer. Saldo atualizado!";
        }, 2000);
    </script>
</body>
</html>
