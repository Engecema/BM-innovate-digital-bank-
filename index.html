<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engecema | Digital Banking</title>
    
    <!-- CONFIGURAÇÕES DE APP NATIVO (ANDROID & IOS) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root { --primary: #0a192f; --accent: #00d2ff; --success: #00ff88; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: var(--primary); color: #fff; display: flex; flex-direction: column; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        header { padding: 40px 20px; text-align: center; }
        .logo { max-width: 130px; filter: drop-shadow(0 0 15px rgba(0,210,255,0.2)); }

        .main-card { background: var(--card); backdrop-filter: blur(20px); margin: 0 20px; padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .balance-label { font-size: 0.8rem; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 2.5rem; font-weight: 800; color: var(--success); margin: 15px 0; }

        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .btn { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; text-align: center; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); font-weight: 600; }
        
        .footer-legal { margin-top: auto; padding: 40px 20px; font-size: 0.75rem; color: #495670; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Engecema" class="logo">
    </header>

    <main class="main-card">
        <div class="balance-label">Saldo Disponível</div>
        <div class="balance-value">R$ <span id="val-saldo">1.550,50</span></div>

        <div class="actions">
            <div class="btn" onclick="alert('Pix Engecema Ativo')">PIX</div>
            <div class="btn" onclick="alert('Extrato Sincronizado')">EXTRATO</div>
            <div class="btn" onclick="location.reload()">SAIR</div>
        </div>
    </main>

    <footer class="footer-legal">
        <strong>ENGECEMA ENGENHARIA FOMENTO E TECNOLOGIA LTDA.</strong><br>
        CNPJ: 05.368.602/0001-10<br>
        Rua Jose de Moraes Rego, 1299, Centro<br>
        Campinas do Piaui - PI | © 2026 Engecema Bank
    </footer>

    <script>
        // REGISTRO DO SERVICE WORKER (PARA INSTALAÇÃO ANDROID/IOS)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        
        // LÓGICA DE INTERATIVIDADE
        console.log("Engecema Mobile App Ready - Action #127");
    </script>
</body>
</html>
