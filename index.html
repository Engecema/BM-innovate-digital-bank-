<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate | Black Concierge</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; transition: background 2s; }
        .gold-theme { color: #d4af37 !important; border-color: #d4af37 !important; }
        .black-card { background: linear-gradient(145deg, #111, #333); border-radius: 20px; padding: 30px; width: 100%; max-width: 340px; border: 1px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); position: relative; overflow: hidden; margin: 0 auto; }
        .milhas-card { background: #111; border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; margin: 20px auto; border: 1px solid #444; }
        .btn-black { background: #d4af37; color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; max-width: 340px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .shimmer { position: absolute; top: -100%; left: -100%; width: 50%; height: 300%; background: rgba(255,255,255,0.1); transform: rotate(45deg); animation: shine 4s infinite; }
        @keyframes shine { 0% { left: -100%; } 100% { left: 200%; } }
    </style>
</head>
<body id="body">
    <div style="text-align: center; margin-bottom: 30px;">
        <div id="status-label" style="font-size: 0.7rem; letter-spacing: 3px; color: #27ae60;">DETECTANDO PATRIMÔNIO...</div>
        <div style="font-size: 2.5rem; font-weight: bold;">R$ 4.627,02</div>
    </div>

    <div class="black-card" id="card">
        <div class="shimmer"></div>
        <div style="font-size: 0.6rem; letter-spacing: 3px;">INNOVATE METAL</div>
        <div style="margin: 40px 0; font-size: 1.2rem; letter-spacing: 4px;">•••• •••• •••• 0001</div>
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span>GEONIMATOS</span>
            <span id="categoria-txt">BLACK</span>
        </div>
    </div>

    <div class="milhas-card">
        <div style="color: #d4af37; font-weight: bold; font-size: 0.8rem;">✈️ CONCIERGE DE MILHAS</div>
        <div style="font-size: 1.5rem; font-weight: bold; margin: 5px 0;">24.060 Milhas</div>
        <small style="color: #888;">Destinos Disponíveis: Paris, Miami, Maldivas</small>
    </div>

    <button class="btn-black">Solicitar Concierge</button>

    <script>
        setTimeout(() => {
            document.getElementById('body').style.background = '#050505';
            document.getElementById('status-label').innerText = "UPGRADE BLACK ATIVADO";
            document.getElementById('status-label').style.color = "#d4af37";
            document.getElementById('card').style.borderColor = "#d4af37";
        }, 2500);
    </script>
</body>
</html>
