<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Engecema</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px; background-color: #f0f2f5; display: flex; justify-content: center; }
        form { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #161616; margin-top: 0; font-size: 24px; }
        .campo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #393939; }
        input { width: 100%; padding: 12px; border: 1px solid #dde1e6; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #0f62fe; outline: none; box-shadow: 0 0 0 2px rgba(15, 98, 254, 0.2); }
        button { background-color: #0f62fe; color: white; border: none; padding: 14px 20px; width: 100%; cursor: pointer; border-radius: 6px; font-size: 16px; font-weight: 600; transition: background 0.2s; }
        button:hover { background-color: #0353e9; }
    </style>
</head>
<body>

    <form action="COLE_AQUI_A_URL_DO_WEBHOOK_DA_IBM_CLOUD" method="POST">
        <h2>Cadastro de Integrante</h2>
        
        <div class="campo">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
        </div>

        <div class="campo">
            <label for="email">E-mail Corporativo</label>
            <input type="email" id="email" name="email" placeholder="email@engecema.com" required>
        </div>

        <div class="campo">
            <label for="telefone">WhatsApp / Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
        </div>

        <!-- O campo 'source' ajuda a identificar no Cloudant de onde veio o dado -->
        <input type="hidden" name="source" value="github_pages_engecema">

        <button type="submit">Enviar para IBM Cloudant</button>
    </form>

</body>
</html>
