<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Abertura de Conta</title>
    
    <!-- Link direto para o arquivo favicon.ico que você subiu -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #da1e28; text-align: center; margin-bottom: 25px; font-size: 26px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .erro-senha { color: #da1e28; font-size: 13px; display: none; margin-bottom: 10px; font-weight: bold; text-align: center; }
        
        /* BOTÃO VERMELHO PADRÃO ENGECEMA */
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #da1e28; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s;
        }
        button:hover { background-color: #b91922; }
    </style>
</head>
<body>

<form id="formCadastro">
    <h2>Dados Cadastrais</h2>
    
    <label>Nome Completo</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

    <label>E-mail Corporativo</label>
    <input type="email" id="email" name="email" placeholder="seu@email.com" required>

    <label>CPF</label>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>

    <label>Crie uma Senha</label>
    <input type="password" id="senha" name="senha" placeholder="******" required>

    <label>Confirme a Senha</label>
    <input type="password" id="confirmar_senha" placeholder="******" required>
    <div id="msgErro" class="erro-senha">As senhas não coincidem!</div>

    <button type="submit" id="btnFinalizar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmar_senha').value;
    const msgErro = document.getElementById('msgErro');

    if (senha !== confirma) {
        msgErro.style.display = 'block';
        return;
    }
    msgErro.style.display = 'none';

    const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        cpf: document.getElementById('cpf').value,
        data: new Date().toLocaleDateString('pt-BR')
    };

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const URL_CL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    try {
        // Envio para o Cloudant (Modo que evitou o erro de rede)
        fetch(URL_CL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Authorization': 'Basic ' + btoa("apikey:" + API_KEY), 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        alert("Cadastro enviado com sucesso! Abrindo seu comprovante Engecema...");

        // ABERTURA DO COMPROVANTE EM NOVA ABA
        const win = window.open("", "_blank");
        if (win) {
            win.document.write(`
                <html>
                <head><title>Comprovante Engecema Private</title></head>
                <body style="font-family:sans-serif; padding:50px; text-align:center; border: 10px solid #da1e28; max-width: 700px; margin: auto;">
                    <img src="https://engecema.github.io" width="150" style="margin-bottom:20px;">
                    <h1 style="color:#da1e28;">Comprovante de Solicitação de Abertura</h1>
                    <hr>
                    <div style="text-align:left; font-size:18px; line-height:1.6;">
                        <p><strong>Titular:</strong> ${dados.nome}</p>
                        <p><strong>CPF:</strong> ${dados.cpf}</p>
                        <p><strong>E-mail:</strong> ${dados.email}</p>
                        <p><strong>Data do Registro:</strong> ${dados.data}</p>
                        <p><strong>Status:</strong> Em Processamento</p>
                    </div>
                    <br>
                    <button onclick="window.print()" style="background:#da1e28; color:white; padding:15px 30px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:18px;">IMPRIMIR COMPROVANTE</button>
                    <p style="margin-top:30px; color:gray; font-size:12px;">Engecema Private Banking - Documento Digital</p>
                </body>
                </html>
            `);
        }

        this.reset();
    } catch (err) {
        alert("Erro técnico ao processar abertura de conta.");
    }
};
</script>

</body>
</html>
