<script>
document.getElementById('formCadastro').onsubmit = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnFinalizar');
    btn.innerText = "Processando...";
    
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmar_senha').value;
    
    if (senha !== confirma) {
        document.getElementById('msgErro').style.display = 'block';
        btn.innerText = "Finalizar Cadastro";
        return;
    }

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    // URL limpa sem a chave exposta no link (evita bloqueio do navegador)
    const URL_DB = `https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud`;

    const formData = new FormData(this);
    const dados = Object.fromEntries(formData.entries());
    delete dados.confirmar_senha;
    dados.criado_em = new Date().toISOString();

    try {
        const response = await fetch(URL_DB, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa("apikey:" + API_KEY)
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Cadastro Engecema Private Realizado com Sucesso!");
            window.location.href = "index.html";
        } else {
            alert("Erro na IBM Cloud. Verifique as permissões de escrita do banco.");
        }
    } catch (error) {
        alert("Erro de Segurança: Use uma aba anônima ou verifique o CORS no painel IBM.");
    } finally {
        btn.innerText = "Finalizar Cadastro";
    }
};
</script>
