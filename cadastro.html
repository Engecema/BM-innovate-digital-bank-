<!-- No seu cadastro.html, substitua a tag <form> por esta -->
<form id="meuFormulario">
    <h2>Cadastro de Integrante</h2>
    <input type="text" name="nome" placeholder="Nome" required><br><br>
    <input type="email" name="email" placeholder="E-mail" required><br><br>
    <button type="submit">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1. CONFIGURAÇÕES (Substitua pelos seus dados da IBM Cloud)
    const API_KEY = "tO0QwCdsmpGLgvBHHabvKq1PxVN9em0M_zUqO"; 
    const CLOUDANT_URL = "	
https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud"; // Ex: https://...cloudantnosqldb.appdomain.cloud
    const DB_NAME = "cliente_engecema"; // O nome da base de dados dentro do Cloudant

    // 2. CAPTURA DOS DADOS
    const formData = new FormData(e.target);
    const dados = Object.fromEntries(formData.entries());

    try {
        // O Cloudant exige que a API Key seja convertida em um Token ou enviada via Basic Auth (Codificada)
        const auth = btoa("apikey:" + API_KEY); 

        const response = await fetch(`${CLOUDANT_URL}/${DB_NAME}`, {
            method: 'POST',
            headers: {
                'Authorization': `Basic ${auth}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Cadastro realizado com sucesso!");
            e.target.reset();
        } else {
            alert("Erro ao enviar dados. Verifique as credenciais.");
        }
    } catch (error) {
        console.error("Erro na integração:", error);
    }
});
</script>
