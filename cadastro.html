<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engecema Private | Cadastro Concluído</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --gold: #c5a059;
            --bg: #1a1a1a;
            --card: #2d2d2d;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: "Bradesco Sans", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 50px;
            border: 1px solid var(--gold);
            background-color: var(--card);
            border-radius: 4px;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .icon { font-size: 60px; color: var(--gold); margin-bottom: 20px; }
        h1 { color: var(--gold); font-weight: 300; margin-bottom: 15px; }
        p { color: #aaa; line-height: 1.6; margin-bottom: 35px; }
        
        .btn-acesso {
            display: inline-block;
            padding: 16px 40px;
            background-color: var(--gold);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }
        .btn-acesso:hover {
            background-color: #b08d4a;
            transform: translateY(-3px);
        }
        .logo-footer { margin-top: 40px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">✓</div>
    <h1>Cadastro Concluído</h1>
    <p>Seu perfil de investidor Engecema Private foi ativado. Sua grade de produtos em tempo real já está disponível via Dallas.</p>

    <!-- LINK DEFINITIVO: Aponta para o arquivo produtos.html que já existe na sua raiz -->
    <a href="produtos.html" class="btn-acesso">
        Acessar Interface de Produtos
    </a>

    <div class="logo-footer">
        <img src="logo.png" alt="Engecema Private" style="height: 45px;">
    </div>
</div>

<script>
    // Log para auditoria no F12
    console.log("Fluxo Engecema: Cadastro finalizado. Redirecionando para produtos.html.");
</script>

</body>
</html>
