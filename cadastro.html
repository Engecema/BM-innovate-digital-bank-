<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Engecema Private Banking - Sistema de Cadastro Integrado">
    <title>Bradesco | Cadastro Engecema Private</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* ESTILIZAÇÃO COMPLETA PADRÃO BRADESCO PRIVATE */
        :root {
            --bradesco-red: #cc092f;
            --bg-gray: #f4f4f4;
            --input-border: #ddd;
            --text-main: #333;
            --success-green: #28a745;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-gray);
            font-family: "Bradesco Sans", Arial, Helvetica, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 50px;
            border-top: 8px solid var(--bradesco-red);
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        header { text-align: center; margin-bottom: 40px; }
        .logo-img { height: 50px; width: auto; }
        h2 {
            color: var(--text-main);
            text-align: center;
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 26px;
            letter-spacing: -0.5px;
        }
        .form-group { margin-bottom: 20px; width: 100%; }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--bradesco-red);
            background: #fff;
            outline: none;
            box-shadow: 0 0 8px rgba(204,9,47,0.15);
        }
        .btn-red {
            width: 100%;
            padding: 18px;
            background: var(--bradesco-red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-red:hover { background: #a00725; transform: translateY(-2px); }

        /* TELA DE SUCESSO */
        .success-box { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .icon-check {
            font-size: 70px;
            color: var(--success-green);
            margin-bottom: 30px;
            display: block;
        }
        .success-text {
            color: #777;
            margin-bottom: 40px;
            line-height: 1.8;
            font-size: 16px;
        }

        .footer-info {
            text-align: center;
            margin-top: 40px;
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- ETAPA 1: FORMULÁRIO DE REGISTRO (5 CAMPOS) -->
        <div id="step-register">
            <header>
                <img src="logo.png" alt="Bradesco Engecema" class="logo-img">
            </header>
            <h2>Realizar Cadastro</h2>
            
            <div class="form-group"><input type="text" id="nome" placeholder="Nome Completo" required></div>
            <div class="form-group"><input type="email" id="email" placeholder="E-mail" required></div>
            <div class="form-group"><input type="text" id="cpf" placeholder="CPF" required></div>
            <div class="form-group"><input type="password" id="senha" placeholder="Senha" required></div>
            <div class="form-group"><input type="password" id="confirma" placeholder="Confirmar Senha" required></div>

            <button class="btn-red" onclick="finalizarProcesso()">Finalizar Cadastro</button>
        </div>

        <!-- ETAPA 2: REGISTRO CONCLUÍDO COM REDIRECIONAMENTO -->
        <div id="step-success" class="success-box">
            <span class="icon-check">✓</span>
            <h2>Registro Concluído</h2>
            <p class="success-text">
                Seu perfil Private Engecema foi ativado com sucesso. Sua grade de produtos e serviços está disponível via Dallas.
            </p>
            
            <!-- CORREÇÃO DE DIRECIONAMENTO: Manda para produtos.html (Interface Banking) -->
            <button class="btn-red" onclick="window.location.href='produtos.html'">Acessar Interface de Produtos</button>
        </div>

        <div class="footer-info">Engecema Private Banking | us-south (Dallas)</div>
    </div>

    <script>
        /**
         * Lógica de Transição e Validação
         */
        function finalizarProcesso() {
            const ids = ['nome', 'email', 'cpf', 'senha', 'confirma'];
            const todosPreenchidos = ids.every(id => document.getElementById(id).value.trim() !== "");

            if (todosPreenchidos) {
                document.getElementById('step-register').style.display = 'none';
                document.getElementById('step-success').style.display = 'block';
                console.log("Fluxo Engecema: Cadastro finalizado. Redirecionando para produtos.html");
            } else {
                alert("Por favor, preencha todos os 5 campos obrigatoriamente.");
            }
        }
    </script>
</body>
</html>
