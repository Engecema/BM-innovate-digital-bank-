<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro Seguro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f0f2f5; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #0f62fe; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dde1e6; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #0f62fe; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.2s; }
        button:hover { background-color: #0353e9; }
    </style>
</head>
<body>

<form id="meuFormulario">
    <h2>Abertura de Conta</h2>
    <label>Nome Completo</label>
    <input type="text" name="nome" placeholder="Digite seu nome" required>
    
    <label>E-mail Corporativo</label>
    <input type="email" name="email" placeholder="seu@email.com" required>
    
    <button type="submit" id="btnEnviar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnEnviar');
    btn.innerText = "Validando...";
    btn.disabled = true;

    // 1. AS DUAS CHAVES QUE VOCÊ FORNECEU
    const APIKEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const IAM_APIKEY = "ApiKey-71c5e05c-1176-4fa6-bd22-e0514e317b4e";
    
    // 2. URL DO SEU WEBHOOK (No App Configuration)
    // Se o seu Webhook aponta para o Cloudant, use a URL dele aqui:
    const WEBHOOK_URL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    const formData = new FormData(e.target);
    const dados = Object.fromEntries(formData.entries());
    dados.timestamp = new Date().toISOString();
    dados.seguranca = "IAM_Validated";

    try {
        // Enviando com os cabeçalhos de segurança que a IBM Cloud exige para Webhooks
        const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-App-Config-API-Key': APIKEY, // Chave de acesso do Webhook
                'Authorization': 'Basic ' + btoa('apikey:' + APIKEY) // Autenticação para o Cloudant
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Sucesso! Cadastro Engecema Private realizado com as duas chaves de segurança.");
            e.target.reset();
        } else {
            const erro = await response.text();
            console.error(erro);
            alert("Erro na IBM: Verifique se o Webhook está ativo e o CORS em '*'.");
        }
    } catch (error) {
        alert("Falha na comunicação. Verifique a conexão com a IBM Cloud.");
    } finally {
        btn.innerText = "Finalizar Cadastro";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
