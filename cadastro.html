<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Engecema Private - Cadastro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f4; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #0f62fe; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #0f62fe; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<form id="meuFormulario">
    <h2>Abertura de Conta</h2>
    <input type="text" name="nome" placeholder="Nome Completo" required>
    <input type="email" name="email" placeholder="E-mail Corporativo" required>
    <button type="submit" id="btnEnviar">Finalizar Cadastro</button>
</form>

<script>
document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnEnviar');
    btn.innerText = "Enviando...";

    // 1. DADOS DO WEBHOOK (APP CONFIGURATION)
    const IAM_APIKEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    // COPIE A URL DO WEBHOOK NO PAINEL DO APP CONFIGURATION
    const WEBHOOK_URL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    const formData = new FormData(e.target);
    const dados = Object.fromEntries(formData.entries());
    dados.timestamp = new Date().toISOString();

    try {
        const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            // O Webhook não exige Authorization complexo no navegador
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Sucesso! O Engecema Private recebeu sua solicitação.");
            e.target.reset();
        } else {
            alert("Erro no servidor. Verifique se o Webhook está configurado no App Configuration.");
        }
    } catch (error) {
        // Se der erro de rede aqui, o problema é a URL do Webhook que está incorreta
        alert("Erro de conexão. Verifique a URL do Webhook no painel da IBM.");
    } finally {
        btn.innerText = "Finalizar Cadastro";
    }
});
</script>

</body>
</html>
