<script>
document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1. SUAS CREDENCIAIS ENGEGEMA
    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const CLOUDANT_URL = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";
    const DB_NAME = "cliente_engecema";

    const formData = new FormData(e.target);
    const dados = Object.fromEntries(formData.entries());
    dados.timestamp = new Date().toISOString();

    try {
        // PASSO A: GERAÇÃO DO TOKEN (O "ESPELHAMENTO" DE SEGURANÇA BANCÁRIA)
        // Isso troca sua apikey por um Token temporário, eliminando o erro 401 de senha
        const authRes = await fetch("https://iam.cloud.ibm.com", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json" },
            body: `grant_type=urn:ibm:params:oauth:grant-type:apikey&apikey=${API_KEY}`
        });
        
        const authData = await authRes.json();
        const accessToken = authData.access_token;

        // PASSO B: ENVIO DOS DADOS COM O TOKEN GERADO
        const response = await fetch(`${CLOUDANT_URL}/${DB_NAME}`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${accessToken}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Sucesso! Cadastro Engecema Private realizado com segurança de Token.");
            e.target.reset();
        } else {
            alert("Erro na gravação. Verifique se o CORS está em 'Allow all domains (*)' no Cloudant.");
        }
    } catch (error) {
        alert("Falha na comunicação com a IBM Cloud.");
    }
});
</script>
