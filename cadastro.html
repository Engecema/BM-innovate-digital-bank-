<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Engecema Private | Abertura de Conta Dallas</title>
    <style>
        :root { --br-red: #cc092f; --br-gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .form-container { 
            background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; max-width: 450px; border-top: 6px solid var(--br-red); 
        }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header img { height: 45px; margin-bottom: 15px; }
        .form-header h2 { color: var(--br-red); font-weight: 800; text-transform: uppercase; font-size: 20px; margin: 0; }
        
        .field-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 4px; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: var(--br-red); outline: none; background: #fff; box-shadow: 0 0 8px rgba(204, 9, 47, 0.1); }
        
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--br-red); color: #fff; border: none; 
            border-radius: 4px; font-weight: 900; text-transform: uppercase; cursor: pointer; 
            font-size: 16px; margin-top: 15px; transition: 0.3s; 
        }
        .btn-submit:hover { background: #a50725; transform: translateY(-2px); }
        
        .footer-info { text-align: center; margin-top: 25px; font-size: 11px; color: #999; line-height: 1.6; }
        .error-msg { color: var(--br-red); font-size: 12px; font-weight: bold; display: none; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <img src="logo.png" alt="Engecema">
        <h2>Abertura de Conta Private</h2>
    </div>

    <form id="formCadastroEngecema">
        <div class="field-group">
            <label>Nome Completo do Titular</label>
            <input type="text" name="nome" placeholder="Ex: João da Silva" required>
        </div>

        <div class="field-group">
            <label>CPF / Documento Digital</label>
            <input type="text" name="cpf" id="cpf-mask" placeholder="000.000.000-00" required>
        </div>

        <div class="field-group">
            <label>E-mail Corporativo</label>
            <input type="email" name="email" placeholder="nome@empresa.com.br" required>
        </div>

        <div class="field-group">
            <label>Senha de Acesso (4 Dígitos)</label>
            <input type="password" id="senha" name="senha" maxlength="4" placeholder="••••" required>
        </div>

        <div class="field-group">
            <label>Confirmar Senha Dallas</label>
            <input type="password" id="confirmar_senha" maxlength="4" placeholder="••••" required>
            <span id="msgErro" class="error-msg">As senhas digitadas não coincidem!</span>
        </div>

        <button type="submit" id="btnFinalizar" class="btn-submit">Finalizar Credenciamento</button>
    </form>

    <div class="footer-info">
        Engecema Fomento e Tecnologia Ltda.<br>
        Protocolo de Segurança: Dallas us-south / IBM Cloudant Verified.<br>
        © 2026 Conexão Criptografada 256-bits.
    </div>
</div>

<script>
document.getElementById('formCadastroEngecema').onsubmit = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnFinalizar');
    const s = document.getElementById('senha').value;
    const c = document.getElementById('confirmar_senha').value;
    const erro = document.getElementById('msgErro');

    if (s !== c) {
        erro.style.display = 'block';
        return;
    } else {
        erro.style.display = 'none';
    }

    btn.innerText = "CONECTANDO TERMINAL DALLAS...";
    btn.disabled = true;

    const API_KEY = "G4mi3uBOjSMFifAA1Bhj6O7rEbZ5FBNyeJG7YH9fxg_n";
    const URL_DB = "https://7f404dab-9bd6-4dc7-8b0b-e0e4a4283d5c-bluemix.cloudantnosqldb.appdomain.cloud";

    const formData = new FormData(this);
    const dados = Object.fromEntries(formData.entries());
    delete dados.confirmar_senha;
    dados.criado_em = new Date().toISOString();
    dados.status = "Aguardando Aprovação Dallas";

    try {
        const response = await fetch(URL_DB, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa("apikey:" + API_KEY)
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("SUCESSO! Cadastro Engecema Private enviado para o Terminal Dallas.");
            window.location.href = "index.html";
        } else {
            throw new Error("Resposta negativa da IBM Cloud.");
        }
    } catch (error) {
        console.error("Erro Dallas:", error);
        // MODO CONTINGÊNCIA: Garante que o cliente não fique travado em erro de rede
        alert("MODO OFFLINE ATIVADO: Seus dados foram pré-validados. O consultor entrará em contato em instantes.");
        window.location.href = "index.html";
    }
};
</script>

</body>
</html>
